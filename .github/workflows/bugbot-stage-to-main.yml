# Trigger Cursor Bugbot only for PRs: stage → main
#
# Bugbot has no native base/head branch filter. This workflow scopes reviews by:
# 1. Enabling Bugbot on the repo in "manual / mention only" mode (dashboard), and
# 2. Triggering a review here when a PR targets main from stage.
#
# Setup (one-time):
# - Connect GitHub + enable Bugbot for this repo: https://cursor.com/dashboard?tab=bugbot
# - Turn on "Run only when mentioned" / manualTriggerOnly for this repo
#   (otherwise Bugbot still auto-reviews every PR)
# - Optional but recommended: repo secret CURSOR_API_KEY (Cursor Dashboard → API Keys)
#   with access to POST https://api.cursor.com/bugbot/review. Without it, the workflow
#   comments `bugbot run` on the PR instead.

name: Bugbot (stage → main)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

concurrency:
  group: bugbot-stage-main-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  trigger-bugbot:
    if: github.head_ref == 'stage' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Trigger Bugbot
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          trigger_via_comment() {
            local marker='<!-- bugbot-stage-main-trigger -->'
            local body
            body="$(printf '%s\nbugbot run\n\n_Automated trigger for `stage` → `main`._' "$marker")"
            local existing_id
            existing_id="$(gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
              --jq ".[] | select(.body != null and (.body | contains(\"${marker}\"))) | .id" \
              | head -n 1 || true)"
            if [ -n "${existing_id}" ]; then
              gh api --method PATCH "repos/${GH_REPO}/issues/comments/${existing_id}" \
                -f body="$body" >/dev/null
              echo "Updated existing Bugbot trigger comment (#${existing_id})."
            else
              gh api --method POST "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
                -f body="$body" >/dev/null
              echo "Posted Bugbot trigger comment."
            fi
          }

          if [ -n "${CURSOR_API_KEY}" ]; then
            echo "Triggering Bugbot via Cursor API..."
            http_code="$(curl --silent --show-error --output /tmp/bugbot-response.json --write-out '%{http_code}' \
              --request POST \
              --url https://api.cursor.com/bugbot/review \
              -u "${CURSOR_API_KEY}:" \
              --header 'Content-Type: application/json' \
              --data "{\"prUrl\": \"${PR_URL}\"}")"
            echo "API HTTP ${http_code}"
            cat /tmp/bugbot-response.json || true
            echo
            if [ "${http_code}" -ge 200 ] && [ "${http_code}" -lt 300 ]; then
              echo "Bugbot review queued via API."
              exit 0
            fi
            echo "API trigger failed; falling back to PR comment."
          else
            echo "CURSOR_API_KEY secret not set; using PR comment trigger."
          fi

          trigger_via_comment
